<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTAZAR 59 | Próximamente</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --black: #000000; --dark: #0a0a0a; --light: #ffffff; --gray: #888888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--black);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { padding: 50px; max-width: 800px; }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 20px;
            color: var(--neon);
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
        }
        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 40px;
            color: var(--light);
        }
        p {
            font-size: 1.3rem;
            color: var(--gray);
            margin-bottom: 50px;
            line-height: 1.8;
        }
        .contact {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            margin-top: 40px;
        }
        .contact h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .contact p {
            margin-bottom: 20px;
        }
        .email {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--neon);
            text-decoration: none;
        }
        .email:hover {
            text-decoration: underline;
        }
        .instagram {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }
        .instagram:hover {
            opacity: 0.9;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 60px;
        }
        .logo span { color: var(--neon); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">CORTAZAR <span>59</span></div>
        <h1>PRÓXIMAMENTE</h1>
        <h2>Sitio Web en Construcción</h2>
        <p>Estamos preparando algo épico.<br>La web oficial de Lander Cortázar #59 estará disponible muy pronto.</p>
        
        <div class="contact">
            <h3>Contacto Profesional</h3>
            <p>Si estás interesado en formar parte de mi carrera deportiva:</p>
            <a href="mailto:landercortazarromero@gmail.com" class="email">landercortazarromero@gmail.com</a>
            <br><br>
            <a href="https://instagram.com/cortazar_59" target="_blank" class="instagram">@cortazar_59</a>
        </div>
    </div>
</body>
</html>
